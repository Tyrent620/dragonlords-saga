<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Odyssey of the Dragonlords — The Saga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0a1622; --night2:#0f2132; --panel:#132a3e; --panel2:#0e2032;
    --bronze:#c9a227; --bronze-dim:#8a7327; --gold:#e6c760;
    --marble:#ece6d4; --ink:#c1cfdb; --dim:#7c93a4;
    --teal:#43b3a7; --crimson:#b0442f; --line:rgba(201,162,39,.26);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--night);color:var(--ink);
    font-family:"EB Garamond",Georgia,serif;font-size:18px;line-height:1.62;overflow-x:hidden}
  /* drifting oracle-vapor background */
  body::before,body::after{content:"";position:fixed;inset:-20%;z-index:-2;pointer-events:none;
    background:radial-gradient(closed,transparent);opacity:.5}
  body::before{background:radial-gradient(600px 400px at 20% 15%,rgba(67,179,167,.10),transparent 60%),
    radial-gradient(700px 500px at 85% 30%,rgba(201,162,39,.08),transparent 60%);animation:drift1 24s ease-in-out infinite alternate}
  body::after{background:radial-gradient(500px 500px at 70% 80%,rgba(67,179,167,.07),transparent 60%),
    radial-gradient(600px 400px at 15% 85%,rgba(45,90,120,.14),transparent 60%);animation:drift2 30s ease-in-out infinite alternate}
  @keyframes drift1{to{transform:translate3d(3%,2%,0) scale(1.05)}}
  @keyframes drift2{to{transform:translate3d(-3%,-2%,0) scale(1.08)}}
  #bg-fixed{position:fixed;inset:0;z-index:-3;
    background:radial-gradient(1200px 700px at 50% -10%,#16324c 0%,var(--night) 62%)}

  h1,h2,h3,.disp,nav a,.tier{font-family:"Cinzel",Georgia,serif}
  a{color:var(--teal);text-decoration:none}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);
    background:linear-gradient(180deg,rgba(10,22,34,.96),rgba(10,22,34,.82));
    border-bottom:1px solid var(--line)}
  .nav .wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding-top:12px;padding-bottom:12px}
  .brand{font-family:"Cinzel";font-weight:700;color:var(--marble);font-size:17px;letter-spacing:.06em;margin-right:auto}
  .brand span{color:var(--bronze)}
  nav a{color:var(--dim);font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:4px 2px;border-bottom:2px solid transparent;transition:.15s}
  nav a:hover{color:var(--ink)}
  nav a.active{color:var(--gold);border-bottom-color:var(--bronze)}

  /* PAGE HEADERS */
  .phead{text-align:center;padding:52px 0 8px}
  .phead .eyebrow{color:var(--teal);letter-spacing:.34em;font-size:12px;text-transform:uppercase;font-family:"Cinzel"}
  .phead h1{color:var(--marble);font-size:clamp(28px,5vw,46px);margin:.2em 0 .1em;font-weight:900;letter-spacing:.02em}
  .phead .sub{color:var(--dim);font-style:italic;font-size:17px}
  .meander{height:12px;max-width:300px;margin:18px auto 6px;
    background-image:repeating-linear-gradient(90deg,var(--bronze) 0 3px,transparent 3px 6px);opacity:.5}
  section.view{padding-bottom:80px;animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* CHRONICLE */
  .stanza{max-width:760px;margin:0 auto 34px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:5px;padding:30px 34px;box-shadow:0 14px 40px rgba(0,0,0,.4)}
  .stanza .st-eyebrow{color:var(--teal);font-family:"Cinzel";letter-spacing:.2em;font-size:11px;text-transform:uppercase}
  .stanza h2{font-family:"Cinzel";color:var(--gold);font-size:26px;margin:.1em 0 .5em;font-weight:700}
  .stanza p{margin:0 0 1em;color:var(--marble);font-size:18.5px}
  .stanza p:first-of-type::first-letter{font-family:"Cinzel";font-weight:700;font-size:3.2em;line-height:.8;
    float:left;color:var(--bronze);margin:.05em .12em 0 0}
  .stanza .rule{height:1px;background:var(--line);margin:6px 0 14px}

  /* HEROES */
  .heroes{display:grid;gap:22px;grid-template-columns:1fr;margin-top:14px}
  @media(min-width:720px){.heroes{grid-template-columns:1fr 1fr}}
  .hero{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:5px;padding:24px;display:flex;gap:18px;box-shadow:0 12px 34px rgba(0,0,0,.36)}
  .hero .por{min-width:78px;width:78px;height:78px;border-radius:50%;overflow:hidden;
    border:2px solid var(--bronze);background:var(--night2);display:flex;align-items:center;justify-content:center}
  .hero .por img{width:100%;height:100%;object-fit:cover}
  .hero .por .mono{font-family:"Cinzel";font-size:34px;color:var(--bronze);font-weight:700}
  .hero h3{font-family:"Cinzel";color:var(--marble);margin:0;font-size:20px}
  .hero .title{color:var(--gold);font-family:"Cinzel";font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin:2px 0 6px}
  .hero .epithet{color:var(--teal);font-style:italic;font-size:15px;margin-bottom:8px}
  .hero p{margin:0;color:var(--ink);font-size:16px}

  /* FAME */
  .famehead{text-align:center;margin-bottom:6px}
  .famenum{font-family:"Cinzel";font-weight:900;font-size:66px;color:var(--marble);line-height:1;text-shadow:0 0 22px rgba(67,179,167,.4)}
  .fameof{color:var(--dim);font-size:16px}
  .fametier{color:var(--gold);font-family:"Cinzel";letter-spacing:.18em;text-transform:uppercase;font-size:15px;margin-top:4px}
  .ladder{max-width:720px;margin:22px auto 0}
  .tierband{font-family:"Cinzel";font-size:11px;letter-spacing:.2em;color:var(--bronze);text-transform:uppercase;
    margin:16px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--line)}
  .rung{display:grid;grid-template-columns:36px 1fr;gap:12px;padding:8px 10px;border-left:4px solid transparent;border-radius:3px}
  .rung .n{font-family:"Cinzel";text-align:center;color:var(--dim);font-size:15px}
  .rung .p{color:var(--dim);font-size:16px}
  .rung.earned{background:rgba(201,162,39,.05)}
  .rung.earned .n{color:var(--bronze)} .rung.earned .p{color:var(--ink)}
  .rung.current{background:linear-gradient(90deg,rgba(67,179,167,.18),transparent);border-left-color:var(--teal)}
  .rung.current .n{color:var(--teal)} .rung.current .p{color:var(--marble)}
  .rung.current .here{color:var(--teal);font-family:"Cinzel";font-size:11px;letter-spacing:.12em;margin-left:6px}

  /* CODEX */
  .codexcat{font-family:"Cinzel";color:var(--teal);letter-spacing:.16em;text-transform:uppercase;font-size:13px;
    margin:26px 0 10px;text-align:center}
  .codexgrid{display:grid;gap:16px;grid-template-columns:1fr;max-width:820px;margin:0 auto}
  @media(min-width:720px){.codexgrid{grid-template-columns:1fr 1fr}}
  .entry{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:4px;padding:18px 20px}
  .entry h4{font-family:"Cinzel";color:var(--gold);margin:0 0 6px;font-size:16px;letter-spacing:.03em}
  .entry p{margin:0;color:var(--ink);font-size:16px}

  /* JOURNEY */
  .path{max-width:640px;margin:20px auto 0;position:relative;padding-left:38px}
  .path::before{content:"";position:absolute;left:11px;top:8px;bottom:8px;width:2px;
    background:linear-gradient(180deg,var(--bronze),var(--teal),rgba(124,147,164,.3))}
  .stop{position:relative;margin-bottom:26px}
  .stop .dot{position:absolute;left:-34px;top:3px;width:20px;height:20px;border-radius:50%;
    border:2px solid var(--bronze);background:var(--night)}
  .stop.past .dot{background:var(--bronze)}
  .stop.current .dot{border-color:var(--teal);background:var(--teal);box-shadow:0 0 0 0 rgba(67,179,167,.6);animation:pulse 2s infinite}
  .stop.ahead .dot{border-color:var(--dim);border-style:dashed;background:var(--night)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(67,179,167,.5)}70%{box-shadow:0 0 0 12px rgba(67,179,167,0)}100%{box-shadow:0 0 0 0 rgba(67,179,167,0)}}
  .stop h3{font-family:"Cinzel";margin:0;font-size:18px;color:var(--marble)}
  .stop.ahead h3{color:var(--dim)}
  .stop .badge{font-family:"Cinzel";font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-left:8px;color:var(--teal)}
  .stop.past .badge{color:var(--bronze)} .stop.ahead .badge{color:var(--dim)}
  .stop p{margin:3px 0 0;color:var(--ink);font-size:16px}
  .stop.ahead p{font-style:italic;color:var(--dim)}

  /* RUMORS */
  .rumorgrid{columns:2;column-gap:20px;max-width:900px;margin:14px auto 0}
  @media(max-width:640px){.rumorgrid{columns:1}}
  .rumor{break-inside:avoid;background:linear-gradient(180deg,#1a2a1f,#16241c);
    border:1px solid rgba(201,162,39,.22);border-radius:4px;padding:16px 18px;margin-bottom:18px;
    box-shadow:0 8px 22px rgba(0,0,0,.34)}
  .rumor .about{font-family:"Cinzel";font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze);
    display:inline-block;border:1px solid var(--bronze-dim);border-radius:20px;padding:2px 10px;margin-bottom:8px}
  .rumor p{margin:0;color:var(--marble);font-style:italic;font-size:16.5px}
  .rumor p::before{content:"“";color:var(--bronze);font-size:1.3em;vertical-align:-.15em}
  .rumor p::after{content:"”";color:var(--bronze)}
  .whisper-note{text-align:center;color:var(--dim);font-style:italic;font-size:15px;max-width:620px;margin:6px auto 20px}

  footer{border-top:1px solid var(--line);text-align:center;padding:26px 20px;color:var(--dim);font-size:13px}
  footer .meander{max-width:200px;margin:0 auto 12px}
</style>
</head>
<body>
<div id="bg-fixed"></div>
<header class="nav">
  <div class="wrap">
    <div class="brand" id="brand">Thylea</div>
    <nav id="navlinks"></nav>
  </div>
</header>
<main id="app" class="wrap"></main>
<footer>
  <div class="meander"></div>
  <div id="foot">The saga continues.</div>
</footer>

<script>
/* ============================================================================
   THYLEA — PLAYER COMPANION SITE  ·  CONTENT FILE
   ----------------------------------------------------------------------------
   THIS is the only file you edit. Change the values below, save, re-upload.
   The site (index.html) reads everything from here. Never edit index.html.

   GOLDEN RULE: players-only. Put NOTHING here they shouldn't know.
   Keep DM secrets (true rumors, twists, tactics) in your prep files instead.

   HOW TO ADD THINGS: each section is a list. Copy an existing { ... } block,
   paste it, edit the text. Commas between blocks. That's it.
   ============================================================================ */

const CAMPAIGN = {

  /* ---- Site header ---- */
  meta: {
    title: "Odyssey of the Dragonlords",
    subtitle: "The Saga of the Heroes of the Heartlands, as sung by Kyrah",
  },

  /* ---- Current Fame (0–20). Just change this number as it rises. ---- */
  fame: 1,

  /* ---- The four heroes. Add an image URL to `img` when you have portraits
         (upload art somewhere and paste the link); leave "" for a monogram. -- */
  heroes: [
    { name: "Baruk Stonefoot", title: "The Gifted One", img: "",
      epithet: "who would not believe the last dragon dead",
      text: "A rock gnome of the Mithral Mountains and — by his own estimation — the foremost living authority on dragons. He has staked his whole life on a truth the world calls a fool's dream: that the great dragons of the Dragonlords are not all dead, and that he will be the one to prove it." },
    { name: "Raxus", title: "The Demigod", img: "",
      epithet: "calf of the slaughtered steppes, and son of the Battle-God",
      text: "Born a minotaur calf on the wild Northern Steppes, orphaned by a dragon and sold south to the fighting pits of Mytros — where a strength not entirely mortal woke in him. The crowds named him Raxus and the bards began to sing. Newly freed of his chains, he walks the road with a fire in his blood that no one can explain." },
    { name: "Cyrus", title: "The Reaper", img: "",
      epithet: "keeper of the dead, who would not let go",
      text: "Raised among the shadow-touched keepers of the dead in the Necropolis at Telamok, sworn to the Fates. He broke the oldest law of his calling — he loved a soul he was meant to carry into the dark — and when she was lost between the living world and the dead, he swore he would find her, whatever it costs." },
    { name: "Phoebe Asteria", title: "The Exile", img: "",
      epithet: "moonlit and moth-crowned, keeper of the old songs",
      text: "A siren raised in the moonlit Silver Grove by the druid Thalia, keeper of the old rites and the older gods. Moth-haloed and strange, a quiet legend among those who still keep the old ways — and, since her mentor's passing, called by omens out of the grove and into a wider world." },
  ],

  /* ---- The Chronicle: Kyrah's growing epic. Newest entry FIRST.
         Add a new { ... } block at the top after each session. --------------- */
  chronicle: [
    { title: "The First Song",
      subtitle: "The Boar of the Heartlands",
      body: "The Twin Titans, brooding in their storm-wracked tower, loosed a corrupted beast upon the Heartlands — a great boar, sent to bleed the land and break the faith of mortals. And four came forward when braver names had failed, gathered to a black-timbered inn by a poet with laurel in her hair.\n\nInto the cold and the fog they went, north into the ruined hills, and found the beast at its grim feast in the mouth of a reeking cave. Spear and spell and fury they answered it with, until the monster that no hunter had felled lay broken at their feet.\n\nAnd when the moment came to give the great kill its due, these four did not bend the knee to the Lord of Storms as his Order demanded. They raised the pyre to another — and something in the wind seemed pleased. So their names begin to travel ahead of them now, east and south, toward the Temple of the Oracle, where the naiad Versi waits to speak of what is to come." },
    { title: "Invocation to the Muse",
      subtitle: "The Bard Takes Up the Tale",
      body: "Sing, Memory — of saviours, of heroes, of champions. Sing of the Odyssey of the Dragonlords, and tell their tale once again.\n\nOf Baruk, who would not believe the last dragon dead. Of Raxus, calf of the slaughtered steppes and son of the Battle-God. Of Cyrus, keeper of the dead, who would not let go. Of Phoebe, moonlit and moth-crowned, who carries the old songs still.\n\nO Muse of memories long past — sing of Thylea, of her hour of crisis and her hour of salvation. Sing, and tell this tale once more in our time." },
  ],

  /* ---- The Codex: what the party has LEARNED. Category options are free text;
         the site groups by whatever you write in `cat`. Add entries as they
         discover things. Keep it to what they actually know. ------------------ */
  codex: [
    { cat: "The Powers", name: "The Five Gods",
      text: "The gods the mortals of Thylea revere — though in these dark days their priests have grown scarce and their temples quiet, and the faithful wonder if the gods can still act at all." },
    { cat: "The Powers", name: "The Twin Titans",
      text: "Sydon, the Lord of Storms, and his sister-wife Lutheria, the Mistress of Madness. The old powers who ruled Thylea before mortals came — and who have never forgiven them for it." },
    { cat: "The Powers", name: "The Oath of Peace",
      text: "The ancient pact that shackled the Titans' wrath and protected the settlers for five hundred years. Its power is now waning — and with it, the horrors it once held back are stirring." },
    { cat: "People", name: "Kyrah the Poet",
      text: "A dark-haired poet in service to the Oracle, laurel in her hair, who summoned the heroes to the Sour Vintage. Sharp-tongued, quick to wonder, and eager to make their deeds into an epic. There is more to her than she lets on." },
    { cat: "People", name: "Versi, the Oracle",
      text: "A naiad seer of ancient power who brokered the Oath of Peace long ago, and who has now foreseen the Doom of Thylea — and the heroes who might avert it." },
    { cat: "Places", name: "The Sour Vintage",
      text: "A country inn at a crossroads east of Estoria, black-timbered and warm, where four strangers became a company." },
    { cat: "Places", name: "The Temple of the Oracle",
      text: "Home of the naiad Versi, hidden deep in a cleft of the earth where the ground itself breathes steam." },
    { cat: "Lore", name: "The Doom of Thylea",
      text: "The Oracle's dire prophecy: the death of the gods, the fall of Mytros, and the end of the mortal age — unless the heroes of her vision can turn the tide." },
  ],

  /* ---- The Journey: waypoints in order. status: "past", "current", "ahead".
         "ahead" entries show as unwritten/locked (no spoilers). --------------- */
  journey: [
    { name: "The Sour Vintage", status: "past",
      text: "Where a poet gathered four strangers and named them heroes." },
    { name: "The Boar's Cave", status: "past",
      text: "In the ravaged hills, the corrupted beast was slain and given to the gods." },
    { name: "The Road East", status: "current",
      text: "Bound for the Temple of the Oracle, and whatever fate she has seen." },
    { name: "The Temple of the Oracle", status: "ahead",
      text: "The road ahead is yet unwritten." },
    { name: "Estoria", status: "ahead",
      text: "The road ahead is yet unwritten." },
  ],

  /* ---- Rumors & Whispers: the tavern gossip the party has heard about ONE
         ANOTHER. Player-facing versions ONLY — never mark which are true. ----- */
  rumors: [
    { about: "Baruk", text: "He keeps humanoids in that 'preserved creatures' collection of his — not just beasts." },
    { about: "Baruk", text: "A monster in the caves near his village killed a string of townsfolk. Baruk swears he destroyed it, but no one ever saw a body, and it's never been seen since." },
    { about: "Baruk", text: "They say he summons succubi at night, on account of never once having landed a girlfriend." },
    { about: "Raxus", text: "At a very young age, he flew into a blind rage and slaughtered everyone in his home village." },
    { about: "Raxus", text: "That monstrous shape isn't natural — he was cursed into it by one of the gods." },
    { about: "Raxus", text: "The minotaur is a god's son. They say his father is Pythor, the God of Battle himself." },
    { about: "Cyrus", text: "He carries that black iron scythe because he believes every soul he reaps brings him one step closer to a woman he lost." },
    { about: "Cyrus", text: "The blade was forged from a shard of a Dragonlord's weapon, and can cut the very threads of fate." },
    { about: "Cyrus", text: "When he's alone, travelers swear you can hear him talking to someone standing beside him — though no one is ever there." },
    { about: "Phoebe", text: "She isn't a real siren — just look at her. That's why she can't fly." },
    { about: "Phoebe", text: "She's cursed. Everyone who gets close to her dies." },
    { about: "Phoebe", text: "She is the lost daughter of a murdered queen." },
  ],
};

</script>
<script>
/* ---- fixed lore (from the book) — not edited by GM ---- */
const FAME_PERKS=[
 "Known in the taverns of the region where you did your first great deeds.",
 "Locals stand you drinks and challenge you to arm-wrestle for bragging rights.",
 "Songs are composed about you — mostly satirical, gleefully embellished.",
 "Small settlements greet you with food, wine, and gifts.",
 "Villages hold festivals in your name; free lodging; advantage on Persuasion at festivals.",
 "City tales spread; free food, drink, and lodging in Estoria and Mytros.",
 "Bards seek the “real” story; you choose the deed their songs will focus on.",
 "You are the tragic hero of amphitheater plays; audiences demand you rise and bow.",
 "Bowing at a play showers you with silver — gold, if you take the stage yourself.",
 "Taverns everywhere compete to comp your food, drink, and lodging.",
 "Recognized in crowds; move openly and admirers may mob you for an hour.",
 "Idealized statues of you stand in Mytros and Estoria; visitors leave offerings.",
 "A public appearance in the great cities can earn you a minor magic item.",
 "The world has you on a pedestal — backing down from a challenge costs you.",
 "Three shrines rise in your name, each tended by a priest and a bard.",
 "Golden statues crown your shrines, guarded by cultists you may summon.",
 "Pilgrims throng your shrines, and gold flows to you from your priests.",
 "Your greatest shrine becomes a temple, and a small fortune flows each day.",
 "Rival gods begin to plot against you, and send monsters to test your worth.",
 "Your name is etched into the multiverse — and you may ascend to godhood itself."
];
const TIERS=[[1,"Local Hero"],[6,"Renowned"],[11,"Celebrated"],[16,"Legend of Thylea"]];
const tierOf=n=>{let t="Unsung";for(const[s,name]of TIERS)if(n>=s)t=name;return t;};
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const paras=s=>s.split("\n\n").map(p=>`<p>${esc(p)}</p>`).join("");

const VIEWS=[
 ["chronicle","The Chronicle"],["heroes","The Heroes"],["fame","Fame"],
 ["codex","Codex"],["journey","The Journey"],["rumors","Whispers"]
];

function phead(eyebrow,title,sub){
  return `<div class="phead"><div class="eyebrow">${esc(eyebrow)}</div>
    <h1>${esc(title)}</h1>${sub?`<div class="sub">${esc(sub)}</div>`:""}
    <div class="meander"></div></div>`;
}

const R={
 chronicle(){
   const items=CAMPAIGN.chronicle.map(e=>`
     <article class="stanza">
       <div class="st-eyebrow">${esc(e.subtitle||"")}</div>
       <h2>${esc(e.title)}</h2><div class="rule"></div>
       ${paras(e.body)}
     </article>`).join("");
   return phead("As sung by Kyrah","The Chronicle","The saga of the Heroes of the Heartlands")+items;
 },
 heroes(){
   const cards=CAMPAIGN.heroes.map(h=>{
     const por=h.img?`<img src="${esc(h.img)}" alt="${esc(h.name)}">`
                    :`<div class="mono">${esc(h.name.trim()[0]||"?")}</div>`;
     return `<div class="hero"><div class="por">${por}</div>
       <div><h3>${esc(h.name)}</h3><div class="title">${esc(h.title)}</div>
       <div class="epithet">${esc(h.epithet)}</div><p>${esc(h.text)}</p></div></div>`;
   }).join("");
   return phead("The Oracle's Chosen","The Heroes","Four who answered the call")+`<div class="heroes">${cards}</div>`;
 },
 fame(){
   const f=CAMPAIGN.fame|0;
   let last=null,rows="";
   FAME_PERKS.forEach((p,i)=>{
     const n=i+1,t=tierOf(n);
     if(t!==last){rows+=`<div class="tierband">${t}</div>`;last=t;}
     const cls="rung"+(n<=f?" earned":"")+(n===f?" current":"");
     rows+=`<div class="${cls}"><div class="n">${n}</div><div class="p">${esc(p)}${n===f?'<span class="here">◄ you are here</span>':""}</div></div>`;
   });
   return phead("How Thylea Sees You","Fame")+
     `<div class="famehead"><div class="famenum">${f}</div><span class="fameof"> / 20</span>
       <div class="fametier">${f<1?"Unsung":tierOf(f)}</div></div>
      <div class="ladder">${rows}</div>`;
 },
 codex(){
   const cats={};
   CAMPAIGN.codex.forEach(e=>{(cats[e.cat]=cats[e.cat]||[]).push(e);});
   let out="";
   for(const c in cats){
     out+=`<div class="codexcat">${esc(c)}</div><div class="codexgrid">`+
       cats[c].map(e=>`<div class="entry"><h4>${esc(e.name)}</h4><p>${esc(e.text)}</p></div>`).join("")+
       `</div>`;
   }
   return phead("What We Know","Codex of Thylea","Knowledge earned upon the road")+out;
 },
 journey(){
   const stops=CAMPAIGN.journey.map(s=>{
     const badge=s.status==="current"?"here now":s.status==="ahead"?"unwritten":"behind us";
     return `<div class="stop ${esc(s.status)}"><div class="dot"></div>
       <h3>${esc(s.name)}<span class="badge">${badge}</span></h3><p>${esc(s.text)}</p></div>`;
   }).join("");
   return phead("Our Journey So Far","The Journey","The path of the heroes across Thylea")+`<div class="path">${stops}</div>`;
 },
 rumors(){
   const cards=CAMPAIGN.rumors.map(r=>`
     <div class="rumor"><span class="about">of ${esc(r.about)}</span><p>${esc(r.text)}</p></div>`).join("");
   return phead("Tavern Talk","Whispers","What the road says of you — believe what you will")+
     `<p class="whisper-note">Gossip, half-truth, and legend. Some of it may even be true.</p>
      <div class="rumorgrid">${cards}</div>`;
 }
};

function render(){
  const hash=(location.hash.replace("#/","")||"chronicle");
  const view=R[hash]?hash:"chronicle";
  document.getElementById("app").innerHTML=`<section class="view">${R[view]()}</section>`;
  document.querySelectorAll("#navlinks a").forEach(a=>a.classList.toggle("active",a.dataset.v===view));
  window.scrollTo({top:0,behavior:"instant"in window?"instant":"auto"});
}
function boot(){
  document.getElementById("brand").innerHTML=esc(CAMPAIGN.meta.title.split(" ")[0])+
    ` <span>${esc(CAMPAIGN.meta.title.split(" ").slice(1).join(" "))}</span>`;
  document.getElementById("navlinks").innerHTML=VIEWS.map(([v,label])=>
    `<a href="#/${v}" data-v="${v}">${esc(label)}</a>`).join("");
  document.getElementById("foot").textContent=CAMPAIGN.meta.subtitle;
  window.addEventListener("hashchange",render);
  render();
}
boot();
</script>
</body>
</html>
